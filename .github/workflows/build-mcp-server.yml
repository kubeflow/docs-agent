# Build and push MCP server image to GHCR (no local Docker disk usage required).
# After push: update the image on your cluster, e.g.
#   kubectl set image deployment/mcp-kubeflow-docs mcp-server=ghcr.io/<owner>/mcp-kubeflow-docs:<tag> -n docs-agent

name: Build MCP server (GHCR)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Additional tag besides sha (e.g. all-tools-v3). Leave blank for sha-only."
        required: false
        default: ""
  push:
    paths:
      - "kagent-feast-mcp/mcp-server/**"
      - ".github/workflows/build-mcp-server.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mcp-kubeflow-docs

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kagent-feast-mcp
          file: ./kagent-feast-mcp/mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
