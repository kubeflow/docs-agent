apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  namespace: docs-agent
data:
  COLLECTION_NAME: kubeflow_docs
  ISSUES_COLLECTION_NAME: issues_rag
  CODE_COLLECTION_NAME: code_rag
  EMBEDDINGS_URL: http://embeddings-service-predictor.ml-infra.svc.cluster.local/embed
  MILVUS_URI: http://milvus-milvus.ml-infra.svc.cluster.local:19530
  MILVUS_USER: root
  PORT: "8000"
  PYTHONUNBUFFERED: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubeflow-docs
  namespace: docs-agent
  labels:
    app: mcp-kubeflow-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-kubeflow-docs
  template:
    metadata:
      labels:
        app: mcp-kubeflow-docs
    spec:
      imagePullSecrets:
        - name: ghcrsecret
      containers:
        - name: mcp-server
          image: ghcr.io/kubeflow/mcp-kubeflow-docs:v0.1.0
          ports:
            - name: mcp
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mcp-server-config
          env:
            - name: MILVUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-server-secret
                  key: MILVUS_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-kubeflow-docs
  namespace: docs-agent
spec:
  selector:
    app: mcp-kubeflow-docs
  ports:
    - name: mcp
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
