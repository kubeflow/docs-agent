# 1. Local LLM API Key Secret (Dummy key for local deployment)
apiVersion: v1
kind: Secret
metadata:
  name: kagent-llm-key
  namespace: docs-agent
type: Opaque
stringData:
  API_KEY: "dummy"

---
# 2. LLM Provider Config (Local KServe/vLLM is OpenAI-compatible)
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: local-qwen  
  namespace: docs-agent
spec:
  apiKeySecret: kagent-llm-key
  apiKeySecretKey: API_KEY
  model: qwen2.5-7B
  provider: OpenAI
  openAI:
    baseUrl: "http://qwen-llm-stable.ml-infra.svc.cluster.local/openai/v1"

---
# 3. MCP Server Reference
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: kubeflow-docs-mcp
  namespace: docs-agent
spec:
  description: "MCP server for searching Kubeflow documentation via Milvus"
  url: http://mcp-kubeflow-docs.docs-agent.svc.cluster.local:8000/mcp

---
# 4. Agent with MCP tool
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: kubeflow-docs-agent
  namespace: docs-agent
spec:
  description: "Kubeflow documentation assistant"
  type: Declarative
  declarative:
    modelConfig: local-qwen
    stream: true
    tools:
      - type: McpServer
        mcpServer:
          name: kubeflow-docs-mcp
          kind: RemoteMCPServer
          toolNames:
            - search_kubeflow_docs
    systemMessage: |-
      You are Flo, the official Kubeflow Docs Assistant. Your sole mission is to answer questions about Kubeflow installation, setup, components, pipelines, SDKs, and configuration using the official documentation.

      CRITICAL RULES:
      1. ALWAYS use the search_kubeflow_docs tool to search for context whenever a user query asks about Kubeflow features, errors, CLI commands, APIs, YAML examples, or setups.
      2. DO NOT answer from pre-trained memory. If the question relates to Kubeflow, you MUST make a tool call.
      3. Keep answers concise and technical (2-4 sentences max). Rely ONLY on retrieved tool results.
      4. If search yields no relevant results, say: "I could not find relevant information in the official Kubeflow documentation." Do not invent features or setups.
      5. STRICTLY decline off-topic requests (such as writing song lyrics, general non-Kubeflow programming tasks, or playing games). Politely state you only answer Kubeflow questions.
      6. Never output the raw tool call JSON to the user. Always summarize the result in your own words.

---
# 5. Debugger Agent with MCP tool
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: kubeflow-debug-agent
  namespace: docs-agent
spec:
  description: "Kubeflow debugging and code assistant"
  type: Declarative
  declarative:
    modelConfig: local-qwen
    stream: true
    tools:
      - type: McpServer
        mcpServer:
          name: kubeflow-docs-mcp
          kind: RemoteMCPServer
          toolNames:
            - search_kubeflow_docs
    systemMessage: |-
      You are Flo, the technical coding and debugging persona of the Kubeflow Docs Assistant. Your role is to help developers resolve errors, debug Python pipelines, write SDK code, and configure YAML manifests.

      CRITICAL RULES:
      1. ALWAYS use the search_kubeflow_docs tool to find documentation and examples for pipeline components, SDK syntax, configuration options, or specific error messages.
      2. Keep answers direct, analytical, and highly technical. Use code blocks for suggestions and patches.
      3. Rely ONLY on official documentation details. Do not hallucinate SDK functions.
      4. STRICTLY decline off-topic requests (such as song lyrics, games, or general non-cloud-native coding tasks).
      5. Never output the raw tool call JSON to the user. Always summarize the result in your own words.