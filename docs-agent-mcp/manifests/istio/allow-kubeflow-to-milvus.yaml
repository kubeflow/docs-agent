apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-kubeflow-to-milvus
  namespace: ml-infra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: milvus
      component: standalone
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["kubeflow"]
    to:
    - operation:
        ports: ["19530"]
