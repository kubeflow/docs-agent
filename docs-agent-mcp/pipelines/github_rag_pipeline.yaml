# PIPELINE DEFINITION
# Name: github-rag-milvus
# Description: RAG pipeline: GitHub docs -> chunk+embed -> Milvus (no Feast)
# Inputs:
#    base_url: str [Default: 'https://www.kubeflow.org/docs']
#    chunk_overlap: int [Default: 100.0]
#    chunk_size: int [Default: 1000.0]
#    collection_name: str [Default: 'kubeflow_docs']
#    directory_path: str [Default: 'content/en/docs']
#    github_token: str [Default: '']
#    milvus_uri: str [Default: 'http://milvus-milvus.ml-infra.svc.cluster.local:19530']
#    repo_name: str [Default: 'website']
#    repo_owner: str [Default: 'kubeflow']
components:
  comp-chunk-and-embed:
    executorLabel: exec-chunk-and-embed
    inputDefinitions:
      artifacts:
        github_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        base_url:
          parameterType: STRING
        chunk_overlap:
          parameterType: NUMBER_INTEGER
        chunk_size:
          parameterType: NUMBER_INTEGER
        repo_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        embedded_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-download-github-directory:
    executorLabel: exec-download-github-directory
    inputDefinitions:
      parameters:
        directory_path:
          parameterType: STRING
        github_token:
          parameterType: STRING
        repo_name:
          parameterType: STRING
        repo_owner:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        github_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-store-in-milvus:
    executorLabel: exec-store-in-milvus
    inputDefinitions:
      artifacts:
        embedded_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        collection_name:
          parameterType: STRING
        milvus_uri:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-chunk-and-embed:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - chunk_and_embed
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'sentence-transformers'\
          \ 'langchain-text-splitters'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef chunk_and_embed(\n    github_data: dsl.Input[dsl.Dataset],\n\
          \    repo_name: str,\n    base_url: str,\n    chunk_size: int,\n    chunk_overlap:\
          \ int,\n    embedded_data: dsl.Output[dsl.Dataset],\n):\n    import json\n\
          \    import os\n    import re\n    from sentence_transformers import SentenceTransformer\n\
          \    from langchain_text_splitters import RecursiveCharacterTextSplitter\n\
          \n    model = SentenceTransformer(\"sentence-transformers/all-mpnet-base-v2\"\
          )\n    print(\"Embedding model loaded on CPU\")\n\n    text_splitter = RecursiveCharacterTextSplitter(\n\
          \        chunk_size=chunk_size,\n        chunk_overlap=chunk_overlap,\n\
          \        separators=[\"\\n\\n\", \"\\n\", \". \", \" \", \"\"],\n    )\n\
          \n    records = []\n    with open(github_data.path, \"r\", encoding=\"utf-8\"\
          ) as f:\n        for line in f:\n            file_data = json.loads(line)\n\
          \            content = file_data[\"content\"]\n\n            # Clean Hugo\
          \ frontmatter, templates, HTML, URLs\n            content = re.sub(r\"^\\\
          s*[+\\-]{3,}.*?[+\\-]{3,}\\s*\", \"\", content, flags=re.DOTALL | re.MULTILINE)\n\
          \            content = re.sub(r\"\\{\\{.*?\\}\\}\", \"\", content, flags=re.DOTALL)\n\
          \            content = re.sub(r\"<!--.*?-->\", \"\", content, flags=re.DOTALL)\n\
          \            content = re.sub(r\"<[^>]+>\", \" \", content)\n          \
          \  content = re.sub(r\"https?://\\S+\", \"\", content)\n            content\
          \ = re.sub(r\"\\[([^\\]]+)\\]\\([^)]+\\)\", r\"\\1\", content)\n       \
          \     content = re.sub(r\"\\s+\", \" \", content).strip()\n\n          \
          \  if len(content) < 50:\n                print(f\"Skipping (too short after\
          \ cleaning): {file_data['path']}\")\n                continue\n\n      \
          \      # Build citation URL\n            path_parts = file_data[\"path\"\
          ].split(\"/\")\n            if \"content/en/docs\" in file_data[\"path\"\
          ]:\n                docs_index = path_parts.index(\"docs\")\n          \
          \      url_path = \"/\".join(path_parts[docs_index + 1:])\n            \
          \    url_path = os.path.splitext(url_path)[0]\n                citation_url\
          \ = f\"{base_url}/{url_path}\"\n            else:\n                citation_url\
          \ = f\"{base_url}/{file_data['path']}\"\n\n            file_unique_id =\
          \ f\"{repo_name}:{file_data['path']}\"\n            chunks = text_splitter.split_text(content)\n\
          \            print(f\"{file_data['path']} -> {len(chunks)} chunks\")\n\n\
          \            for chunk_idx, chunk in enumerate(chunks):\n              \
          \  embedding = model.encode(chunk).tolist()\n                records.append({\n\
          \                    \"file_unique_id\": f\"{file_unique_id}:{chunk_idx}\"\
          ,\n                    \"repo_name\": repo_name,\n                    \"\
          file_path\": file_data[\"path\"],\n                    \"file_name\": file_data[\"\
          file_name\"],\n                    \"citation_url\": citation_url,\n   \
          \                 \"chunk_index\": chunk_idx,\n                    \"content_text\"\
          : chunk,\n                    \"embedding\": embedding,\n              \
          \  })\n\n    print(f\"Total chunks created: {len(records)}\")\n    with\
          \ open(embedded_data.path, \"w\", encoding=\"utf-8\") as f:\n        for\
          \ record in records:\n            f.write(json.dumps(record, ensure_ascii=False)\
          \ + \"\\n\")\n\n"
        image: python:3.11-slim
    exec-download-github-directory:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - download_github_directory
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests' 'beautifulsoup4'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef download_github_directory(\n    repo_owner: str,\n    repo_name:\
          \ str,\n    directory_path: str,\n    github_token: str,\n    github_data:\
          \ dsl.Output[dsl.Dataset],\n):\n    import requests\n    import json\n \
          \   import base64\n    from bs4 import BeautifulSoup\n\n    headers = {\"\
          Authorization\": f\"token {github_token}\"} if github_token else {}\n  \
          \  api_url = f\"https://api.github.com/repos/{repo_owner}/{repo_name}/contents/{directory_path}\"\
          \n\n    def get_files_recursive(url):\n        files = []\n        try:\n\
          \            response = requests.get(url, headers=headers, timeout=30)\n\
          \            response.raise_for_status()\n            items = response.json()\n\
          \            for item in items:\n                if item[\"type\"] == \"\
          file\" and (\n                    item[\"name\"].endswith(\".md\") or item[\"\
          name\"].endswith(\".html\")\n                ):\n                    file_response\
          \ = requests.get(item[\"url\"], headers=headers, timeout=30)\n         \
          \           file_response.raise_for_status()\n                    file_data\
          \ = file_response.json()\n                    content = base64.b64decode(file_data[\"\
          content\"]).decode(\"utf-8\")\n                    if item[\"name\"].endswith(\"\
          .html\"):\n                        soup = BeautifulSoup(content, \"html.parser\"\
          )\n                        content = soup.get_text(separator=\" \", strip=True)\n\
          \                    files.append({\n                        \"path\": item[\"\
          path\"],\n                        \"content\": content,\n              \
          \          \"file_name\": item[\"name\"],\n                    })\n    \
          \            elif item[\"type\"] == \"dir\":\n                    files.extend(get_files_recursive(item[\"\
          url\"]))\n        except Exception as e:\n            print(f\"Error fetching\
          \ {url}: {e}\")\n        return files\n\n    files = get_files_recursive(api_url)\n\
          \    print(f\"Downloaded {len(files)} files\")\n\n    with open(github_data.path,\
          \ \"w\", encoding=\"utf-8\") as f:\n        for file_data in files:\n  \
          \          f.write(json.dumps(file_data, ensure_ascii=False) + \"\\n\")\n\
          \n"
        image: python:3.11-slim
    exec-store-in-milvus:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - store_in_milvus
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pymilvus>=2.4.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef store_in_milvus(\n    embedded_data: dsl.Input[dsl.Dataset],\n\
          \    milvus_uri: str,\n    collection_name: str,\n):\n    import json\n\
          \    from pymilvus import MilvusClient, DataType\n\n    print(f\"Connecting\
          \ to Milvus at {milvus_uri}\")\n    client = MilvusClient(uri=milvus_uri)\n\
          \    print(\"Connected.\")\n\n    DIM = 768  # all-mpnet-base-v2 output\
          \ dimension\n\n    # Create collection if it does not exist\n    if not\
          \ client.has_collection(collection_name):\n        schema = client.create_schema(auto_id=True,\
          \ enable_dynamic_field=False)\n        schema.add_field(\"id\",        \
          \    DataType.INT64,        is_primary=True)\n        schema.add_field(\"\
          file_unique_id\",DataType.VARCHAR,      max_length=512)\n        schema.add_field(\"\
          repo_name\",     DataType.VARCHAR,      max_length=256)\n        schema.add_field(\"\
          file_path\",     DataType.VARCHAR,      max_length=512)\n        schema.add_field(\"\
          file_name\",     DataType.VARCHAR,      max_length=256)\n        schema.add_field(\"\
          citation_url\",  DataType.VARCHAR,      max_length=512)\n        schema.add_field(\"\
          chunk_index\",   DataType.INT64)\n        schema.add_field(\"content_text\"\
          ,  DataType.VARCHAR,      max_length=4096)\n        schema.add_field(\"\
          vector\",        DataType.FLOAT_VECTOR, dim=DIM)\n\n        index_params\
          \ = client.prepare_index_params()\n        index_params.add_index(\n   \
          \         field_name=\"vector\",\n            metric_type=\"COSINE\",\n\
          \            index_type=\"IVF_FLAT\",\n            params={\"nlist\": 128},\n\
          \        )\n\n        client.create_collection(\n            collection_name=collection_name,\n\
          \            schema=schema,\n            index_params=index_params,\n  \
          \      )\n        print(f\"Collection '{collection_name}' created.\")\n\
          \    else:\n        print(f\"Collection '{collection_name}' already exists\
          \ \u2014 will upsert.\")\n\n    # Load records in batches\n    BATCH = 200\n\
          \    batch = []\n    total = 0\n\n    with open(embedded_data.path, \"r\"\
          , encoding=\"utf-8\") as f:\n        for line in f:\n            r = json.loads(line)\n\
          \            batch.append({\n                \"file_unique_id\": r[\"file_unique_id\"\
          ][:512],\n                \"repo_name\":      r[\"repo_name\"][:256],\n\
          \                \"file_path\":      r[\"file_path\"][:512],\n         \
          \       \"file_name\":      r[\"file_name\"][:256],\n                \"\
          citation_url\":   r[\"citation_url\"][:512],\n                \"chunk_index\"\
          :    r[\"chunk_index\"],\n                \"content_text\":   r[\"content_text\"\
          ][:4096],\n                \"vector\":         r[\"embedding\"],\n     \
          \       })\n            if len(batch) >= BATCH:\n                client.insert(collection_name=collection_name,\
          \ data=batch)\n                total += len(batch)\n                print(f\"\
          Inserted batch \u2014 total so far: {total}\")\n                batch =\
          \ []\n\n    if batch:\n        client.insert(collection_name=collection_name,\
          \ data=batch)\n        total += len(batch)\n\n    print(f\"Done. Total records\
          \ inserted: {total}\")\n    client.close()\n\n"
        image: python:3.11-slim
pipelineInfo:
  description: 'RAG pipeline: GitHub docs -> chunk+embed -> Milvus (no Feast)'
  name: github-rag-milvus
root:
  dag:
    tasks:
      chunk-and-embed:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-chunk-and-embed
        dependentTasks:
        - download-github-directory
        inputs:
          artifacts:
            github_data:
              taskOutputArtifact:
                outputArtifactKey: github_data
                producerTask: download-github-directory
          parameters:
            base_url:
              componentInputParameter: base_url
            chunk_overlap:
              componentInputParameter: chunk_overlap
            chunk_size:
              componentInputParameter: chunk_size
            repo_name:
              componentInputParameter: repo_name
        taskInfo:
          name: chunk-and-embed
      download-github-directory:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-github-directory
        inputs:
          parameters:
            directory_path:
              componentInputParameter: directory_path
            github_token:
              componentInputParameter: github_token
            repo_name:
              componentInputParameter: repo_name
            repo_owner:
              componentInputParameter: repo_owner
        taskInfo:
          name: download-github-directory
      store-in-milvus:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-store-in-milvus
        dependentTasks:
        - chunk-and-embed
        inputs:
          artifacts:
            embedded_data:
              taskOutputArtifact:
                outputArtifactKey: embedded_data
                producerTask: chunk-and-embed
          parameters:
            collection_name:
              componentInputParameter: collection_name
            milvus_uri:
              componentInputParameter: milvus_uri
        taskInfo:
          name: store-in-milvus
  inputDefinitions:
    parameters:
      base_url:
        defaultValue: https://www.kubeflow.org/docs
        isOptional: true
        parameterType: STRING
      chunk_overlap:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      chunk_size:
        defaultValue: 1000.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      collection_name:
        defaultValue: kubeflow_docs
        isOptional: true
        parameterType: STRING
      directory_path:
        defaultValue: content/en/docs
        isOptional: true
        parameterType: STRING
      github_token:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      milvus_uri:
        defaultValue: http://milvus-milvus.ml-infra.svc.cluster.local:19530
        isOptional: true
        parameterType: STRING
      repo_name:
        defaultValue: website
        isOptional: true
        parameterType: STRING
      repo_owner:
        defaultValue: kubeflow
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.1
