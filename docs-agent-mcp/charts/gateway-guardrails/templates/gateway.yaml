{{- if .Values.gateway.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: kagent-gateway
  namespace: {{ .Values.namespaces.istioSystem }}
  labels:
    {{- include "gateway-guardrails.labels" . | nindent 4 }}
spec:
  selector:
    {{- toYaml .Values.gateway.selector | nindent 4 }}
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.domain | quote }}
      tls:
        httpsRedirect: {{ .Values.gateway.tls.enabled }}
    {{- if .Values.gateway.tls.enabled }}
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - {{ .Values.domain | quote }}
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.gateway.tls.credentialName }}
    {{- end }}
{{- end }}
