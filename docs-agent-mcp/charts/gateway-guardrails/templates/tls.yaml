{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled .Values.gateway.tls.acme.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.gateway.tls.acme.clusterIssuerName }}
  labels:
    {{- include "gateway-guardrails.labels" . | nindent 4 }}
spec:
  acme:
    server: {{ .Values.gateway.tls.acme.server }}
    email: {{ .Values.gateway.tls.acme.email }}
    privateKeySecretRef:
      name: {{ .Values.gateway.tls.acme.clusterIssuerName }}-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: istio
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kagent-ui-cert
  namespace: {{ .Values.namespaces.istioSystem }}
  labels:
    {{- include "gateway-guardrails.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.gateway.tls.credentialName }}
  issuerRef:
    name: {{ .Values.gateway.tls.acme.clusterIssuerName }}
    kind: ClusterIssuer
  commonName: {{ .Values.domain }}
  dnsNames:
    - {{ .Values.domain }}
{{- end }}
