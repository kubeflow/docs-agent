apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llama-service
  namespace: docs-agent
  annotations:
    autoscaling.knative.dev/scaleToZero: "true"
    autoscaling.knative.dev/scaleToZeroPodRetentionPeriod: "5m"
    autoscaling.knative.dev/initialScale: "1"
    autoscaling.knative.dev/scaleUpDelay: "0s"
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 1
    model:
      modelFormat:
        name: huggingface
      runtime: llm-runtime
      args:
        - --model_id=RedHatAI/Llama-3.1-8B-Instruct
        - --backend=vllm
        - --max-model-len=32768
        - --gpu-memory-utilization=0.90
        - --enable-auto-tool-choice
        - --tool-call-parser=llama3_json
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-secret
              key: token
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "6"
          memory: "24Gi"
          nvidia.com/gpu: "1"