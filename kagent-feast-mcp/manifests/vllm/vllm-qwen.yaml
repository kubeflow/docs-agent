apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-llm
  namespace: ml-infra
  labels:
    app: qwen-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-llm
  template:
    metadata:
      labels:
        app: qwen-llm
    spec:
      # Pin to either GPU node 10.0.10.163 or 10.0.10.227 for maximum performance
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - "10.0.10.163"
                - "10.0.10.227"
      
      # Allow scheduling on tainted GPU nodes
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

      containers:
      - name: vllm
        image: docker.io/vllm/vllm-openai:latest
        args:
          - "--model=Qwen/Qwen3-8B"
          - "--gpu-memory-utilization=0.90"
          - "--max-model-len=4096"
          - "--port=8000"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        resources:
          requests:
            cpu: "2"
            memory: "16Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: "24Gi"
            nvidia.com/gpu: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-llm-service
  namespace: ml-infra
spec:
  selector:
    app: qwen-llm
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
