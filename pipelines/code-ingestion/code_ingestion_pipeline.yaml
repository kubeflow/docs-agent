pipelineInfo:
  description: Code ingestion pipeline for parsing and embedding Kubeflow release
    code repositories
  name: code-ingestion
root:
  dag:
    tasks:
      download-code-repository:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-code-repository
        inputs:
          parameters:
            branch:
              componentInputParameter: branch
            github_token:
              componentInputParameter: github_token
            repo_name:
              componentInputParameter: repo_name
            repo_owner:
              componentInputParameter: repo_owner
        taskInfo:
          name: download-code-repository
      embed-code-chunks:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-embed-code-chunks
        dependentTasks:
        - parse-and-chunk-code
        inputs:
          artifacts:
            parsed_data:
              taskOutputArtifact:
                outputArtifactKey: parsed_data
                producerTask: parse-and-chunk-code
        taskInfo:
          name: embed-code-chunks
      parse-and-chunk-code:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-parse-and-chunk-code
        dependentTasks:
        - download-code-repository
        inputs:
          artifacts:
            code_data:
              taskOutputArtifact:
                outputArtifactKey: code_data
                producerTask: download-code-repository
          parameters:
            repo_name:
              componentInputParameter: repo_name
        taskInfo:
          name: parse-and-chunk-code
      store-code-milvus:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-store-code-milvus
        dependentTasks:
        - embed-code-chunks
        inputs:
          artifacts:
            embedded_data:
              taskOutputArtifact:
                outputArtifactKey: embedded_data
                producerTask: embed-code-chunks
          parameters:
            collection_name:
              componentInputParameter: collection_name
            milvus_host:
              componentInputParameter: milvus_host
            milvus_port:
              componentInputParameter: milvus_port
        taskInfo:
          name: store-code-milvus
  inputDefinitions:
    parameters:
      branch:
        defaultValue: master
        isOptional: true
        parameterType: STRING
      collection_name:
        defaultValue: docs_rag
        isOptional: true
        parameterType: STRING
      github_token:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      milvus_host:
        defaultValue: milvus-standalone-final.docs-agent.svc.cluster.local
        isOptional: true
        parameterType: STRING
      milvus_port:
        defaultValue: '19530'
        isOptional: true
        parameterType: STRING
      repo_name:
        defaultValue: manifests
        isOptional: true
        parameterType: STRING
      repo_owner:
        defaultValue: kubeflow
        isOptional: true
        parameterType: STRING
