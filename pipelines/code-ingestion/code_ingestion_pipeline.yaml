# PIPELINE DEFINITION
# Name: code-ingestion
# Description: Code ingestion pipeline for parsing and embedding Kubeflow release code repositories
# Inputs:
#    branch: str [Default: 'master']
#    collection_name: str [Default: 'docs_rag']
#    github_token: str [Default: '']
#    milvus_host: str [Default: 'milvus-standalone-final.docs-agent.svc.cluster.local']
#    milvus_port: str [Default: '19530']
#    repo_name: str [Default: 'manifests']
#    repo_owner: str [Default: 'kubeflow']
components:
  comp-download-code-repository:
    executorLabel: exec-download-code-repository
    inputDefinitions:
      parameters:
        branch:
          parameterType: STRING
        github_token:
          parameterType: STRING
        repo_name:
          parameterType: STRING
        repo_owner:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        code_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-embed-code-chunks:
    executorLabel: exec-embed-code-chunks
    inputDefinitions:
      artifacts:
        parsed_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        embedded_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-parse-and-chunk-code:
    executorLabel: exec-parse-and-chunk-code
    inputDefinitions:
      artifacts:
        code_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        repo_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        parsed_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-store-code-milvus:
    executorLabel: exec-store-code-milvus
    inputDefinitions:
      artifacts:
        embedded_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        collection_name:
          parameterType: STRING
        milvus_host:
          parameterType: STRING
        milvus_port:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-download-code-repository:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - download_code_repository
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.14.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef download_code_repository(\n    repo_owner: str,\n    repo_name:\
          \ str,\n    branch: str,\n    github_token: str,\n    code_data: dsl.Output[dsl.Dataset]\n\
          ):\n    import subprocess\n    import os\n    import json\n\n    clone_dir\
          \ = \"/tmp/repo_clone\"\n    repo_url = f\"https://github.com/{repo_owner}/{repo_name}.git\"\
          \n    if github_token:\n        repo_url = f\"https://{github_token}@github.com/{repo_owner}/{repo_name}.git\"\
          \n\n    subprocess.run(\n        [\"git\", \"clone\", \"--depth\", \"1\"\
          , \"--branch\", branch, repo_url, clone_dir],\n        check=True, capture_output=True,\
          \ text=True\n    )\n    print(f\"Cloned {repo_owner}/{repo_name} @ {branch}\"\
          )\n\n    VALID_EXTENSIONS = {\".yaml\", \".yml\", \".sh\", \".bash\"}\n\
          \    VALID_FILENAMES = {\"Dockerfile\"}\n    SKIP_DIRS = {\"vendor\", \"\
          .github\", \"tests\", \"test\", \"node_modules\", \".git\", \"__pycache__\"\
          }\n\n    def should_skip_dir(dirname):\n        return dirname in SKIP_DIRS\
          \ or dirname.startswith(\".\")\n\n    def is_valid_file(name):\n       \
          \ if name in VALID_FILENAMES or name.startswith(\"Dockerfile\"):\n     \
          \       return True\n        for ext in VALID_EXTENSIONS:\n            if\
          \ name.endswith(ext):\n                return True\n        return False\n\
          \n    files = []\n    for root, dirs, filenames in os.walk(clone_dir):\n\
          \        dirs[:] = [d for d in dirs if not should_skip_dir(d)]\n\n     \
          \   for fname in filenames:\n            if not is_valid_file(fname):\n\
          \                continue\n            abs_path = os.path.join(root, fname)\n\
          \            rel_path = os.path.relpath(abs_path, clone_dir)\n\n       \
          \     try:\n                with open(abs_path, \"r\", encoding=\"utf-8\"\
          ) as f:\n                    content = f.read()\n            except (UnicodeDecodeError,\
          \ IOError):\n                continue\n\n            files.append({\n  \
          \              \"path\": rel_path,\n                \"content\": content,\n\
          \                \"file_name\": fname\n            })\n\n    print(f\"Found\
          \ {len(files)} code files\")\n\n    with open(code_data.path, \"w\", encoding=\"\
          utf-8\") as f:\n        for file_data in files:\n            f.write(json.dumps(file_data,\
          \ ensure_ascii=False) + \"\\n\")\n\n"
        image: python:3.9
    exec-embed-code-chunks:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - embed_code_chunks
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'sentence-transformers'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.14.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef embed_code_chunks(\n    parsed_data: dsl.Input[dsl.Dataset],\n\
          \    embedded_data: dsl.Output[dsl.Dataset]\n):\n    import json\n    import\
          \ torch\n    from sentence_transformers import SentenceTransformer\n\n \
          \   device = \"cuda\" if torch.cuda.is_available() else \"cpu\"\n    model\
          \ = SentenceTransformer(\"sentence-transformers/all-mpnet-base-v2\", device=device)\n\
          \    print(f\"Model loaded on {device}\")\n\n    records = []\n    with\
          \ open(parsed_data.path, \"r\", encoding=\"utf-8\") as f:\n        for line\
          \ in f:\n            record = json.loads(line)\n            embedding =\
          \ model.encode(record[\"content_text\"]).tolist()\n            record[\"\
          embedding\"] = embedding\n            records.append(record)\n\n    print(f\"\
          Embedded {len(records)} chunks\")\n\n    with open(embedded_data.path, \"\
          w\", encoding=\"utf-8\") as f:\n        for record in records:\n       \
          \     f.write(json.dumps(record, ensure_ascii=False) + \"\\n\")\n\n"
        image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
    exec-parse-and-chunk-code:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - parse_and_chunk_code
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pyyaml'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.14.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef parse_and_chunk_code(\n    code_data: dsl.Input[dsl.Dataset],\n\
          \    repo_name: str,\n    parsed_data: dsl.Output[dsl.Dataset]\n):\n   \
          \ import json\n    import os\n    import re\n    from typing import List,\
          \ Dict, Any, Optional\n\n    KNOWN_TOP_DIRS = {\"applications\", \"common\"\
          , \"experimental\"}\n\n    def _infer_component_name(file_path):\n     \
          \   parts = file_path.replace(\"\\\\\", \"/\").split(\"/\")\n        skip\
          \ = {\"base\", \"overlays\", \"upstream\", \"default\", \".\", \"\", \"\
          installs\", \"components\"}\n\n        for top_dir in (\"applications\"\
          , \"common\", \"experimental\"):\n            if top_dir in parts:\n   \
          \             idx = parts.index(top_dir)\n                if idx + 1 < len(parts)\
          \ and parts[idx + 1] not in skip:\n                    return parts[idx\
          \ + 1]\n\n        if parts[0] == \"scripts\":\n            return \"scripts\"\
          \n\n        for part in parts[:-1]:\n            if part not in skip and\
          \ part not in KNOWN_TOP_DIRS:\n                return part\n\n        return\
          \ \"\"\n\n    def _safe_dump_yaml_block(key, value):\n        try:\n   \
          \         import yaml\n            dumped = yaml.dump({key: value}, default_flow_style=False,\
          \ allow_unicode=True)\n            return dumped.strip()\n        except\
          \ Exception:\n            return f\"{key}: {value}\"\n\n    def _extract_labels(doc):\n\
          \        metadata = doc.get(\"metadata\", {}) or {}\n        labels = metadata.get(\"\
          labels\", {}) or {}\n        annotations = metadata.get(\"annotations\"\
          , {}) or {}\n        result = {}\n        for k, v in labels.items():\n\
          \            result[f\"label:{k}\"] = str(v)\n        for k, v in list(annotations.items())[:5]:\n\
          \            result[f\"annotation:{k}\"] = str(v)\n        return result\n\
          \n    def parse_yaml_manifest(file_path, content):\n        import yaml\n\
          \        chunks = []\n        raw_docs = content.split(\"\\n---\")\n\n \
          \       for raw_doc in raw_docs:\n            raw_doc = raw_doc.strip()\n\
          \            if not raw_doc or raw_doc == \"---\":\n                continue\n\
          \            try:\n                doc = yaml.safe_load(raw_doc)\n     \
          \       except yaml.YAMLError:\n                continue\n            if\
          \ not isinstance(doc, dict):\n                continue\n\n            kind\
          \ = doc.get(\"kind\", \"\")\n            api_version = doc.get(\"apiVersion\"\
          , \"\")\n            metadata_block = doc.get(\"metadata\", {}) or {}\n\
          \            name = metadata_block.get(\"name\", \"\")\n            namespace\
          \ = metadata_block.get(\"namespace\", \"\")\n            component = _infer_component_name(file_path)\n\
          \            labels_map = _extract_labels(doc)\n\n            header_parts\
          \ = []\n            if kind and name:\n                loc = f\"# {kind}/{name}\"\
          \n                if namespace:\n                    loc += f\" in namespace\
          \ {namespace}\"\n                header_parts.append(loc)\n            if\
          \ api_version:\n                header_parts.append(f\"# apiVersion: {api_version}\"\
          )\n            header_parts.append(f\"# File: {file_path}\")\n         \
          \   if component:\n                header_parts.append(f\"# Component: {component}\"\
          )\n            header = \"\\n\".join(header_parts)\n\n            code_meta\
          \ = {\n                \"code_entity_type\": kind if kind else \"k8s_resource\"\
          ,\n                \"code_entity_name\": name,\n                \"component_name\"\
          : component,\n            }\n            if namespace:\n               \
          \ code_meta[\"k8s_namespace\"] = namespace\n            if api_version:\n\
          \                code_meta[\"api_version\"] = api_version\n            if\
          \ labels_map:\n                code_meta[\"labels\"] = labels_map\n\n  \
          \          top_level_keys = [k for k in doc.keys() if k not in (\"apiVersion\"\
          , \"kind\", \"metadata\")]\n\n            if not top_level_keys:\n     \
          \           chunk_text = f\"{header}\\n\\n{raw_doc}\"\n                chunks.append({\"\
          language\": \"yaml\", \"code_metadata\": code_meta, \"content_text\": chunk_text[:4000]})\n\
          \                continue\n\n            for key in top_level_keys:\n  \
          \              section_text = _safe_dump_yaml_block(key, doc[key])\n   \
          \             chunk_text = f\"{header}\\n# Section: {key}\\n\\n{section_text}\"\
          \n                chunks.append({\"language\": \"yaml\", \"code_metadata\"\
          : {**code_meta, \"section\": key}, \"content_text\": chunk_text[:4000]})\n\
          \n        if not chunks:\n            chunks.append({\n                \"\
          language\": \"yaml\",\n                \"code_metadata\": {\"code_entity_type\"\
          : \"\", \"code_entity_name\": \"\", \"component_name\": _infer_component_name(file_path)},\n\
          \                \"content_text\": content[:4000]\n            })\n    \
          \    return chunks\n\n    def parse_kustomization(file_path, content):\n\
          \        import yaml\n        try:\n            doc = yaml.safe_load(content)\n\
          \        except Exception:\n            doc = {}\n        if not isinstance(doc,\
          \ dict):\n            doc = {}\n\n        component = _infer_component_name(file_path)\n\
          \        resources = doc.get(\"resources\", []) or []\n        bases = doc.get(\"\
          bases\", []) or []\n        images = doc.get(\"images\", []) or []\n   \
          \     namespace = doc.get(\"namespace\", \"\")\n        patches_sm = doc.get(\"\
          patchesStrategicMerge\", []) or []\n        patches_json = doc.get(\"patchesJson6902\"\
          , []) or []\n        patches_inline = doc.get(\"patches\", []) or []\n \
          \       config_map_gen = doc.get(\"configMapGenerator\", []) or []\n   \
          \     secret_gen = doc.get(\"secretGenerator\", []) or []\n        components_list\
          \ = doc.get(\"components\", []) or []\n\n        is_overlay = \"overlays\"\
          \ in file_path or \"overlay\" in file_path\n        kustomize_type = \"\
          overlay\" if is_overlay else \"base\"\n\n        header_parts = [f\"# Kustomization\
          \ ({kustomize_type})\", f\"# File: {file_path}\"]\n        if component:\n\
          \            header_parts.append(f\"# Component: {component}\")\n      \
          \  if namespace:\n            header_parts.append(f\"# Namespace: {namespace}\"\
          )\n        if resources:\n            header_parts.append(f\"# Resources:\
          \ {', '.join(str(r) for r in resources[:10])}\")\n        if bases:\n  \
          \          header_parts.append(f\"# Bases: {', '.join(str(b) for b in bases[:10])}\"\
          )\n        if images:\n            img_names = [img.get(\"name\", str(img))\
          \ if isinstance(img, dict) else str(img) for img in images[:5]]\n      \
          \      header_parts.append(f\"# Images: {', '.join(img_names)}\")\n    \
          \    if components_list:\n            header_parts.append(f\"# Components:\
          \ {', '.join(str(c) for c in components_list[:5])}\")\n\n        header\
          \ = \"\\n\".join(header_parts)\n        chunk_text = f\"{header}\\n\\n{content}\"\
          \n\n        code_meta = {\n            \"code_entity_type\": \"kustomization\"\
          ,\n            \"code_entity_name\": component if component else \"kustomization\"\
          ,\n            \"component_name\": component,\n            \"kustomize_type\"\
          : kustomize_type,\n        }\n        if namespace:\n            code_meta[\"\
          k8s_namespace\"] = namespace\n        if resources:\n            code_meta[\"\
          resources\"] = resources[:20]\n        if images:\n            code_meta[\"\
          images\"] = [img.get(\"name\", str(img)) if isinstance(img, dict) else str(img)\
          \ for img in images[:10]]\n        if patches_sm or patches_json or patches_inline:\n\
          \            code_meta[\"has_patches\"] = True\n        if config_map_gen:\n\
          \            code_meta[\"config_map_generators\"] = [g.get(\"name\", \"\"\
          ) for g in config_map_gen if isinstance(g, dict)]\n\n        return [{\"\
          language\": \"yaml\", \"code_metadata\": code_meta, \"content_text\": chunk_text[:4000]}]\n\
          \n    def parse_dockerfile(file_path, content):\n        component = _infer_component_name(file_path)\n\
          \        from_images = re.findall(r\"^FROM\\s+(\\S+)(?:\\s+[Aa][Ss]\\s+(\\\
          S+))?\", content, re.MULTILINE)\n        expose_ports = re.findall(r\"^EXPOSE\\\
          s+(.+)\", content, re.MULTILINE)\n        entrypoints = re.findall(r\"^(?:ENTRYPOINT|CMD)\\\
          s+(.+)\", content, re.MULTILINE)\n        labels = re.findall(r'^LABEL\\\
          s+(.+)', content, re.MULTILINE)\n        args = re.findall(r'^ARG\\s+(\\\
          S+)', content, re.MULTILINE)\n        workdirs = re.findall(r'^WORKDIR\\\
          s+(\\S+)', content, re.MULTILINE)\n        healthchecks = re.findall(r'^HEALTHCHECK\\\
          s+(.+)', content, re.MULTILINE)\n        envs = re.findall(r'^ENV\\s+(\\\
          S+)', content, re.MULTILINE)\n\n        base_imgs = [img[0] for img in from_images]\n\
          \        stage_names = [img[1] for img in from_images if img[1]]\n     \
          \   is_multi_stage = len(from_images) > 1\n\n        header_parts = [f\"\
          # Dockerfile\", f\"# File: {file_path}\"]\n        if component:\n     \
          \       header_parts.append(f\"# Component: {component}\")\n        if base_imgs:\n\
          \            header_parts.append(f\"# Base images: {', '.join(base_imgs)}\"\
          )\n        if is_multi_stage:\n            header_parts.append(f\"# Multi-stage\
          \ build: {len(from_images)} stages\")\n        if expose_ports:\n      \
          \      header_parts.append(f\"# Exposed ports: {', '.join(expose_ports)}\"\
          )\n        if entrypoints:\n            header_parts.append(f\"# Entrypoint:\
          \ {entrypoints[-1].strip()}\")\n\n        header = \"\\n\".join(header_parts)\n\
          \        chunk_text = f\"{header}\\n\\n{content}\"\n\n        code_meta\
          \ = {\n            \"code_entity_type\": \"dockerfile\",\n            \"\
          code_entity_name\": base_imgs[0] if base_imgs else \"\",\n            \"\
          component_name\": component,\n            \"base_images\": base_imgs,\n\
          \        }\n        if is_multi_stage:\n            code_meta[\"is_multi_stage\"\
          ] = True\n            code_meta[\"stage_names\"] = stage_names\n       \
          \ if expose_ports:\n            code_meta[\"exposed_ports\"] = [p.strip()\
          \ for p in expose_ports]\n        if entrypoints:\n            code_meta[\"\
          entrypoint\"] = entrypoints[-1].strip()\n        if args:\n            code_meta[\"\
          build_args\"] = args[:10]\n        if envs:\n            code_meta[\"env_vars\"\
          ] = envs[:10]\n\n        return [{\"language\": \"dockerfile\", \"code_metadata\"\
          : code_meta, \"content_text\": chunk_text[:4000]}]\n\n    def parse_shell(file_path,\
          \ content):\n        component = _infer_component_name(file_path)\n    \
          \    shebang_match = re.match(r\"^#!\\s*(.+)\", content)\n        shebang\
          \ = shebang_match.group(1).strip() if shebang_match else \"\"\n\n      \
          \  sourced_files = re.findall(r'^\\s*(?:source|\\\\.)\\s+[\"\\']?([^\\s\"\
          \\']+)', content, re.MULTILINE)\n        export_vars = re.findall(r'^\\\
          s*export\\s+(\\w+)=', content, re.MULTILINE)\n        set_flags = re.findall(r'^\\\
          s*set\\s+(-\\w+)', content, re.MULTILINE)\n\n        function_pattern =\
          \ re.compile(\n            r\"^(?:function\\s+(\\w[\\w-]*)\\s*(?:\\(\\s*\\\
          ))?\\s*\\{|(\\w[\\w-]*)\\s*\\(\\s*\\)\\s*\\{)\",\n            re.MULTILINE\n\
          \        )\n        function_matches = list(function_pattern.finditer(content))\n\
          \n        base_header_parts = [f\"# Shell script\", f\"# File: {file_path}\"\
          ]\n        if component:\n            base_header_parts.append(f\"# Component:\
          \ {component}\")\n        if shebang:\n            base_header_parts.append(f\"\
          # Shebang: {shebang}\")\n        if sourced_files:\n            base_header_parts.append(f\"\
          # Sources: {', '.join(sourced_files[:5])}\")\n\n        base_meta = {\"\
          component_name\": component}\n        if shebang:\n            base_meta[\"\
          shebang\"] = shebang\n        if sourced_files:\n            base_meta[\"\
          sourced_files\"] = sourced_files\n        if export_vars:\n            base_meta[\"\
          exported_variables\"] = export_vars[:15]\n\n        if len(function_matches)\
          \ < 2:\n            header = \"\\n\".join(base_header_parts)\n         \
          \   chunk_text = f\"{header}\\n\\n{content}\"\n            meta = {**base_meta,\
          \ \"code_entity_type\": \"script\", \"code_entity_name\": file_path.split(\"\
          /\")[-1]}\n            if function_matches:\n                fn = function_matches[0].group(1)\
          \ or function_matches[0].group(2)\n                meta[\"functions\"] =\
          \ [fn]\n            return [{\"language\": \"shell\", \"code_metadata\"\
          : meta, \"content_text\": chunk_text[:4000]}]\n\n        chunks = []\n \
          \       all_func_names = [m.group(1) or m.group(2) for m in function_matches]\n\
          \n        preamble_end = function_matches[0].start()\n        preamble =\
          \ content[:preamble_end].strip()\n        if preamble:\n            header\
          \ = \"\\n\".join(base_header_parts)\n            chunk_text = f\"{header}\\\
          n# Section: preamble\\n\\n{preamble}\"\n            chunks.append({\n  \
          \              \"language\": \"shell\",\n                \"code_metadata\"\
          : {**base_meta, \"code_entity_type\": \"script\", \"code_entity_name\":\
          \ file_path.split(\"/\")[-1], \"functions\": all_func_names},\n        \
          \        \"content_text\": chunk_text[:4000]\n            })\n\n       \
          \ for i, match in enumerate(function_matches):\n            func_name =\
          \ match.group(1) or match.group(2)\n            start = match.start()\n\
          \            end = function_matches[i + 1].start() if i + 1 < len(function_matches)\
          \ else len(content)\n            func_body = content[start:end].strip()\n\
          \n            func_header_parts = base_header_parts + [f\"# Function: {func_name}\"\
          ]\n            header = \"\\n\".join(func_header_parts)\n            chunk_text\
          \ = f\"{header}\\n\\n{func_body}\"\n\n            chunks.append({\n    \
          \            \"language\": \"shell\",\n                \"code_metadata\"\
          : {**base_meta, \"code_entity_type\": \"function\", \"code_entity_name\"\
          : func_name},\n                \"content_text\": chunk_text[:4000]\n   \
          \         })\n\n        return chunks if chunks else [{\"language\": \"\
          shell\", \"code_metadata\": {**base_meta, \"code_entity_type\": \"script\"\
          , \"code_entity_name\": file_path.split(\"/\")[-1]}, \"content_text\": content[:4000]}]\n\
          \n    def dispatch_parse(file_path, content):\n        filename = file_path.split(\"\
          /\")[-1].lower()\n        kustomization_names = {\"kustomization.yaml\"\
          , \"kustomization.yml\", \"kustomization\"}\n        if filename in kustomization_names:\n\
          \            return parse_kustomization(file_path, content)\n        if\
          \ filename.startswith(\"dockerfile\"):\n            return parse_dockerfile(file_path,\
          \ content)\n        if filename.endswith(\".sh\") or filename.endswith(\"\
          .bash\"):\n            return parse_shell(file_path, content)\n        if\
          \ filename.endswith(\".yaml\") or filename.endswith(\".yml\"):\n       \
          \     return parse_yaml_manifest(file_path, content)\n        return [{\"\
          language\": \"\", \"code_metadata\": {\"code_entity_type\": \"\", \"code_entity_name\"\
          : \"\", \"component_name\": _infer_component_name(file_path)}, \"content_text\"\
          : content[:4000]}]\n\n    records = []\n\n    with open(code_data.path,\
          \ \"r\", encoding=\"utf-8\") as f:\n        for line in f:\n           \
          \ file_data = json.loads(line)\n            file_path = file_data[\"path\"\
          ]\n            content = file_data[\"content\"]\n\n            if len(content.strip())\
          \ < 10:\n                continue\n\n            chunks = dispatch_parse(file_path,\
          \ content)\n            github_url = f\"https://github.com/kubeflow/{repo_name}/blob/master/{file_path}\"\
          \n\n            for chunk_idx, chunk in enumerate(chunks):\n           \
          \     file_unique_id = f\"{repo_name}:{file_path}:{chunk_idx}\"\n      \
          \          records.append({\n                    \"file_unique_id\": file_unique_id,\n\
          \                    \"repo_name\": repo_name,\n                    \"file_path\"\
          : file_path,\n                    \"file_name\": file_data[\"file_name\"\
          ],\n                    \"citation_url\": github_url[:1024],\n         \
          \           \"chunk_index\": chunk_idx,\n                    \"content_text\"\
          : chunk[\"content_text\"],\n                    \"language\": chunk[\"language\"\
          ],\n                    \"code_metadata\": chunk[\"code_metadata\"],\n \
          \               })\n\n    print(f\"Parsed {len(records)} chunks from code\
          \ files\")\n\n    with open(parsed_data.path, \"w\", encoding=\"utf-8\"\
          ) as f:\n        for record in records:\n            f.write(json.dumps(record,\
          \ ensure_ascii=False) + \"\\n\")\n\n"
        image: python:3.9
    exec-store-code-milvus:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - store_code_milvus
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pymilvus' 'numpy'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.14.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef store_code_milvus(\n    embedded_data: dsl.Input[dsl.Dataset],\n\
          \    milvus_host: str,\n    milvus_port: str,\n    collection_name: str\n\
          ):\n    from pymilvus import connections, utility, FieldSchema, CollectionSchema,\
          \ DataType, Collection\n    import json\n    from datetime import datetime\n\
          \n    connections.connect(\"default\", host=milvus_host, port=milvus_port)\n\
          \n    if not utility.has_collection(collection_name):\n        fields =\
          \ [\n            FieldSchema(name=\"id\", dtype=DataType.INT64, is_primary=True,\
          \ auto_id=True),\n            FieldSchema(name=\"file_unique_id\", dtype=DataType.VARCHAR,\
          \ max_length=512),\n            FieldSchema(name=\"repo_name\", dtype=DataType.VARCHAR,\
          \ max_length=256),\n            FieldSchema(name=\"file_path\", dtype=DataType.VARCHAR,\
          \ max_length=512),\n            FieldSchema(name=\"file_name\", dtype=DataType.VARCHAR,\
          \ max_length=256),\n            FieldSchema(name=\"citation_url\", dtype=DataType.VARCHAR,\
          \ max_length=1024),\n            FieldSchema(name=\"chunk_index\", dtype=DataType.INT64),\n\
          \            FieldSchema(name=\"content_text\", dtype=DataType.VARCHAR,\
          \ max_length=4000),\n            FieldSchema(name=\"vector\", dtype=DataType.FLOAT_VECTOR,\
          \ dim=768),\n            FieldSchema(name=\"last_updated\", dtype=DataType.INT64),\n\
          \            FieldSchema(name=\"language\", dtype=DataType.VARCHAR, max_length=64),\
          \ # for code \n            FieldSchema(name=\"code_metadata\", dtype=DataType.JSON,\
          \ nullable=True), # for code \n        ]\n        schema = CollectionSchema(fields,\
          \ \"Unified RAG collection for documentation and code\")\n        collection\
          \ = Collection(collection_name, schema)\n        print(f\"Created new collection:\
          \ {collection_name}\")\n    else:\n        collection = Collection(collection_name)\n\
          \        print(f\"Using existing collection: {collection_name}\")\n\n  \
          \  partition_name = \"code\"\n    if not collection.has_partition(partition_name):\n\
          \        collection.create_partition(partition_name)\n        print(f\"\
          Created partition: {partition_name}\")\n    else:\n        print(f\"Partition\
          \ already exists: {partition_name}\")\n\n    records = []\n    timestamp\
          \ = int(datetime.now().timestamp())\n    repo_names_seen = set()\n\n   \
          \ with open(embedded_data.path, \"r\", encoding=\"utf-8\") as f:\n     \
          \   for line in f:\n            record = json.loads(line)\n            repo_names_seen.add(record[\"\
          repo_name\"])\n            records.append({\n                \"file_unique_id\"\
          : record[\"file_unique_id\"],\n                \"repo_name\": record[\"\
          repo_name\"],\n                \"file_path\": record[\"file_path\"],\n \
          \               \"file_name\": record[\"file_name\"],\n                \"\
          citation_url\": record[\"citation_url\"],\n                \"chunk_index\"\
          : record[\"chunk_index\"],\n                \"content_text\": record[\"\
          content_text\"],\n                \"vector\": record[\"embedding\"],\n \
          \               \"last_updated\": timestamp,\n                \"language\"\
          : record.get(\"language\", \"\"),\n                \"code_metadata\": record.get(\"\
          code_metadata\", None),\n            })\n\n    if records:\n        collection.load()\n\
          \        for repo in repo_names_seen:\n            try:\n              \
          \  expr = f'repo_name == \"{repo}\"'\n                collection.delete(expr,\
          \ partition_name=partition_name)\n                print(f\"Deleted old chunks\
          \ for repo '{repo}' from partition '{partition_name}'\")\n            except\
          \ Exception as e:\n                print(f\"No old data to delete for '{repo}':\
          \ {e}\")\n\n        batch_size = 1000\n        for i in range(0, len(records),\
          \ batch_size):\n            batch = records[i:i + batch_size]\n        \
          \    collection.insert(batch, partition_name=partition_name)\n\n       \
          \ collection.flush()\n\n        try:\n            collection.index()\n \
          \       except Exception:\n            index_params = {\n              \
          \  \"metric_type\": \"COSINE\",\n                \"index_type\": \"IVF_FLAT\"\
          ,\n                \"params\": {\"nlist\": min(1024, max(100, len(records)))}\n\
          \            }\n            collection.create_index(\"vector\", index_params)\n\
          \n        collection.load()\n        print(f\"Inserted {len(records)} records\
          \ into partition '{partition_name}'. Total: {collection.num_entities}\"\
          )\n\n"
