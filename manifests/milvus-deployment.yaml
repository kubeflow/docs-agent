apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: docs-agent
  labels:
    app: milvus-standalone
  annotations:
    sidecar.istio.io/inject: "false"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-standalone
  template:
    metadata:
      labels:
        app: milvus-standalone
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:v2.3.4
        command:
        - milvus
        - run
        - standalone
        env:
        - name: ETCD_ENDPOINTS
          value: localhost:2379
        - name: MINIO_ADDRESS
          value: localhost:9000
        - name: MINIO_ACCESS_KEY_ID
          value: minioadmin
        - name: MINIO_SECRET_ACCESS_KEY
          value: minioadmin
        ports:
        - containerPort: 19530
          protocol: TCP
        - containerPort: 9091
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9091
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /milvus/configs
          name: milvus-config

      - name: etcd
        image: quay.io/coreos/etcd:v3.5.0
        command:
        - etcd
        - --advertise-client-urls=http://127.0.0.1:2379
        - --listen-client-urls=http://0.0.0.0:2379
        - --data-dir=/etcd-data
        ports:
        - containerPort: 2379
          protocol: TCP
        volumeMounts:
        - mountPath: /etcd-data
          name: etcd-data

      - name: minio
        image: minio/minio:RELEASE.2023-03-20T20-16-18Z
        command:
        - minio
        - server
        - /minio-data
        - --console-address
        - :9001
        env:
        - name: MINIO_ROOT_USER
          value: minioadmin
        - name: MINIO_ROOT_PASSWORD
          value: minioadmin
        ports:
        - containerPort: 9000
          protocol: TCP
        - containerPort: 9001
          protocol: TCP
        volumeMounts:
        - mountPath: /minio-data
          name: minio-data

      volumes:
      - name: milvus-config
        emptyDir: {}
      - name: etcd-data
        emptyDir: {}
      - name: minio-data
        emptyDir: {}
