# Redis deployment for RateLimitService backend

# Single-pod in-cluster Redis for rate limit counter storage
# All RateLimitService replicas share this instance (no sticky sessions)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-ratelimit
  namespace: <YOUR_NAMESPACE>  # replace with your namespace
  labels:
    app: redis-ratelimit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-ratelimit
  template:
    metadata:
      labels:
        app: redis-ratelimit
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        args:
        - redis-server
        - --maxmemory
        - 64mb
        - --maxmemory-policy
        - volatile-ttl         
        - --save
        - ""                    
        - --appendonly
        - "no"                  
        ports:
        - name: redis
          containerPort: 6379
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 3
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 999
          capabilities:
            drop: ["ALL"]

---
apiVersion: v1
kind: Service
metadata:
  name: redis-ratelimit
  namespace: <YOUR_NAMESPACE>  # replace with your namespace
  labels:
    app: redis-ratelimit
spec:
  selector:
    app: redis-ratelimit
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  type: ClusterIP
